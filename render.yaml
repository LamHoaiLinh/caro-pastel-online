services:
  - type: web
    name: caro-pastel-api
    runtime: go
    plan: free
    rootDir: backend
    buildCommand: go build -trimpath -ldflags="-s -w" -o bin/caro-server ./cmd/server
    startCommand: ./bin/caro-server
    healthCheckPath: /health
    envVars:
      - key: MATCH_DB_PATH
        value: /tmp/caro-pastel-matches.json
